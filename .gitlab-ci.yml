stages:
  - check
  - release

variables:
  CARGO_HOME: $CI_PROJECT_DIR/.cargo

cache:
  key:
    files:
      - Cargo.lock
  paths:
    - .cargo/registry/
    - .cargo/git/
    - target/

check:
  stage: check
  image: rust:latest
  script:
    - rustup component add rustfmt clippy
    - cargo fmt -- --check
    - cargo clippy -- -D warnings
    - cargo test --verbose

release-linux:
  stage: release
  image: rust:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  script:
    - cargo build --release
    - mv target/release/openai openai-linux-amd64
  artifacts:
    paths:
      - openai-linux-amd64

release-windows:
  stage: release
  image: rust:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  script:
    - rustup target add x86_64-pc-windows-msvc
    - cargo install cargo-xwin
    - cargo xwin build --release --target x86_64-pc-windows-msvc
    - mv target/x86_64-pc-windows-msvc/release/openai.exe openai-windows-amd64.exe
  artifacts:
    paths:
      - openai-windows-amd64.exe

upload-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: release-linux
      artifacts: true
    - job: release-windows
      artifacts: true
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  script:
    - echo "Uploading release assets for $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    description: "Release $CI_COMMIT_TAG"
    assets:
      links:
        - name: openai-linux-amd64
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/openai-linux-amd64?job=release-linux"
          link_type: other
        - name: openai-windows-amd64.exe
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/openai-windows-amd64.exe?job=release-windows"
          link_type: other
